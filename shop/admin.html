<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ShopLink Admin | Business Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #1a1614; --accent: #c8442a; --bg: #f8f6f4; 
            --white: #ffffff; --border: #eceae7; --text-main: #2d2926; --text-muted: #8c8581;
            --sidebar-width: 260px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Login Screen */
        #loginWrap { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: var(--primary); position: fixed; z-index: 5000; top:0; left:0; }
        .loginBox { background: var(--white); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }

        /* Sidebar Navigation (Left Side) */
        aside { width: var(--sidebar-width); background: var(--primary); color: white; position: fixed; height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 50px; padding-left: 10px; border-left: 3px solid var(--accent); }
        .brand span { color: var(--accent); }
        
        .nav-list { list-style: none; flex-grow: 1; }
        .nav-item { 
            padding: 15px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; 
            font-size: 14px; font-weight: 500; color: #a0a0a0; transition: 0.3s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* Main Content Area */
        main { flex-grow: 1; margin-left: var(--sidebar-width); padding: 40px; position: relative; }
        
        /* Top Right Add Button */
        .top-action { position: absolute; top: 40px; right: 40px; }
        .add-btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .header-area { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-area h1 { font-family: 'Playfair Display', serif; font-size: 2rem; }

        .panel { display: none; max-width: 1000px; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Forms */
        .card { background: var(--white); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .fGroup { margin-bottom: 15px; }
        .fGroup label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .fGroup input, .fGroup select, .fGroup textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; }
        
        .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .img-slot { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #fafafa; position: relative; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .action-btns { display: flex; gap: 15px; }
        .edit-link { color: #2196F3; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; background: none; border: none; }
        .del-link { color: var(--accent); cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; background: none; border: none; }

        /* Sales Dashboard UI */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; border-bottom: 4px solid var(--accent); }
        .stat-card small { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 800; }
        .stat-card h2 { font-size: 28px; margin-top: 5px; font-family: 'Playfair Display'; }

        /* Modal Overlay */
        #productModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--white); width: 90%; max-width: 550px; padding: 35px; border-radius: 24px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loginWrap">
        <div class="loginBox">
            <h1 style="font-family:'Playfair Display'; margin-bottom:20px;">ShopLink <span>Admin</span></h1>
            <input type="text" id="lUser" placeholder="Username" style="width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border:1px solid var(--border);">
            <input type="password" id="lPass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:25px; border-radius:10px; border:1px solid var(--border);">
            <button class="add-btn" style="width:100%; padding:16px;" onclick="handleLogin()">Enter Management System</button>
        </div>
    </div>

    <aside id="sidebar" style="display:none;">
        <div class="brand">Shop<span>Link</span></div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="showTab(0, this)">Sales & Business</li>
            <li class="nav-item" onclick="showTab(1, this)">Product Inventory</li>
            <li class="nav-item" onclick="showTab(2, this)">Art Categories</li>
            <li class="nav-item" onclick="showTab(3, this)">Admin Settings</li>
        </ul>
        <button class="del-link" style="color:white; opacity:0.5; text-align:left; padding-left:20px;" onclick="location.reload()">Log Out</button>
    </aside>

    <main id="mainPanel" style="display:none;">
        <div class="top-action">
            <button class="add-btn" onclick="openAddModal()">+ New Product</button>
        </div>

        <div class="header-area">
            <h1 id="pageTitle">Sales & Business Management</h1>
        </div>

        <div class="panel active" id="p0">
            <div class="stats-grid">
                <div class="stat-card"><small>Active Inventory</small><h2 id="statProducts">0</h2></div>
                <div class="stat-card"><small>Art Categories</small><h2 id="statCats">0</h2></div>
                <div class="stat-card"><small>Business Status</small><h2>Verified</h2></div>
            </div>
            <div class="card">
                <h3 style="margin-bottom:20px;">Latest Business Activity</h3>
                <div id="salesList"></div>
            </div>
        </div>

        <div class="panel" id="p1">
            <div class="card">
                <div id="inventoryList"></div>
            </div>
        </div>

        <div class="panel" id="p2">
            <div class="card">
                <div id="catListDisplay"></div>
                <div class="fGroup" style="margin-top:25px;"><input type="text" id="newCatName" placeholder="New Category Name"></div>
                <button class="add-btn" style="background:#444;" onclick="addCategory()">+ Create Category</button>
            </div>
        </div>

        <div class="panel" id="p3">
            <div class="card">
                <h3 style="margin-bottom:20px;">Global Preferences</h3>
                <div class="fGroup"><label>Default WhatsApp Number (233...)</label><input type="text" id="prefWA"></div>
                <div class="fGroup"><label>Admin Username</label><input type="text" id="setUSer"></div>
                <div class="fGroup"><label>Admin Password</label><input type="password" id="setPass"></div>
                <button class="add-btn" onclick="saveSettings()">Update Security & Settings</button>
            </div>
        </div>

        <div id="productModal">
            <div class="modal-content">
                <h2 id="modalTitle" style="font-family:'Playfair Display'; margin-bottom:20px;">Add New Product</h2>
                <div class="fGroup">
                    <label>Images (Select up to 3)</label>
                    <div class="img-grid">
                        <div class="img-slot" onclick="triggerFile(0)"><span style="color:#ccc;">+</span><img id="prev0" style="display:none;"></div>
                        <div class="img-slot" onclick="triggerFile(1)"><span style="color:#ccc;">+</span><img id="prev1" style="display:none;"></div>
                        <div class="img-slot" onclick="triggerFile(2)"><span style="color:#ccc;">+</span><img id="prev2" style="display:none;"></div>
                    </div>
                    <input type="file" id="fileIn" style="display:none;" onchange="processFile(this)">
                </div>
                <div class="fGroup"><label>Product Name</label><input type="text" id="pName"></div>
                <div class="fGroup"><label>Price (GH₵)</label><input type="text" id="pPrice"></div>
                <div class="fGroup"><label>Category</label><select id="pCatSelect"></select></div>
                
                <div class="fGroup">
                    <label>Buy Button Preference</label>
                    <select id="pBuyPref" onchange="toggleBuyLink()">
                        <option value="whatsapp">Use WhatsApp Number</option>
                        <option value="url">Use External Website URL</option>
                    </select>
                </div>
                <div class="fGroup" id="urlInputWrap" style="display:none;">
                    <label>External URL (https://...)</label>
                    <input type="text" id="pLink">
                </div>

                <div class="fGroup"><label>Description</label><textarea id="pDesc" rows="3"></textarea></div>
                
                <div style="display:flex; gap:12px; margin-top:25px;">
                    <button class="add-btn" style="flex:2;" onclick="saveProduct()">Save Product Changes</button>
                    <button class="add-btn" style="flex:1; background:#888;" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyB-TbvFPRKuBNT5SnWKvDjTnBYG7Dp6lDU",
            authDomain: "affiliate-9d0f7.firebaseapp.com",
            databaseURL: "https://affiliate-9d0f7-default-rtdb.firebaseio.com",
            projectId: "affiliate-9d0f7",
            storageBucket: "affiliate-9d0f7.firebasestorage.app",
            messagingSenderId: "989805341800",
            appId: "1:989805341800:web:bfd1a1becd6ef48d9e1fdd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let productImages = [null, null, null];
        let currentSlot = 0;
        let editingId = null;

        function handleLogin() {
            const u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            db.ref('admin_creds').once('value', s => {
                const creds = s.val() || { user: 'admin', pass: 'admin123' };
                if(u === creds.user && p === creds.pass) {
                    document.getElementById('loginWrap').style.display = 'none';
                    document.getElementById('sidebar').style.display = 'flex';
                    document.getElementById('mainPanel').style.display = 'block';
                    loadData();
                } else { alert("Invalid Credentials."); }
            });
        }

        function showTab(idx, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p' + idx).classList.add('active');
            btn.classList.add('active');
            const titles = ["Sales & Business Management", "Product Inventory", "Art Categories", "Admin Settings"];
            document.getElementById('pageTitle').innerText = titles[idx];
        }

        function loadData() {
            db.ref('shop_data').on('value', s => {
                window.shop_data = s.val() || { products: [], categories: [], settings: {} };
                renderUI();
            });
        }

        function renderUI() {
            const data = window.shop_data;
            document.getElementById('statProducts').innerText = (data.products || []).length;
            document.getElementById('statCats').innerText = (data.categories || []).length;

            // Categories list
            document.getElementById('catListDisplay').innerHTML = (data.categories || []).map(c => `
                <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee;">
                    <span>${c.name}</span><button class="del-link" onclick="deleteItem('categories', ${c.id})">Remove</button>
                </div>
            `).join('') || "No categories found.";
            document.getElementById('pCatSelect').innerHTML = (data.categories || []).map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            // Products Inventory & Sales Feed
            const products = (data.products || []);
            const prodHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid #eee;">
                    <div><strong>${p.name}</strong><br><small style="color:#888;">${p.category} • GH₵ ${p.price}</small></div>
                    <div class="action-btns">
                        <button class="edit-link" onclick="editProduct(${p.id})">Edit</button>
                        <button class="del-link" onclick="deleteItem('products', ${p.id})">Delete</button>
                    </div>
                </div>
            `).join('') || "Inventory is empty.";
            
            document.getElementById('inventoryList').innerHTML = prodHTML;
            document.getElementById('salesList').innerHTML = prodHTML;

            // Settings
            document.getElementById('prefWA').value = data.settings.whatsappNumber || '';
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').innerText = "Add New Product";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pDesc').value = "";
            document.getElementById('pLink').value = "";
            document.getElementById('pBuyPref').value = "whatsapp";
            toggleBuyLink();
            productImages = [null, null, null];
            [0,1,2].forEach(i => { document.getElementById(`prev${i}`).src = ""; document.getElementById(`prev${i}`).style.display="none"; });
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        function toggleBuyLink() {
            const isUrl = document.getElementById('pBuyPref').value === 'url';
            document.getElementById('urlInputWrap').style.display = isUrl ? 'block' : 'none';
        }

        function triggerFile(slot) { currentSlot = slot; document.getElementById('fileIn').click(); }
        function processFile(input) {
            const reader = new FileReader();
            reader.onload = e => {
                productImages[currentSlot] = e.target.result;
                const prev = document.getElementById(`prev${currentSlot}`);
                prev.src = e.target.result; prev.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const validImgs = productImages.filter(i => i !== null);
            if(!name || validImgs.length === 0) return alert("Missing Product Name or Image!");

            const prod = {
                id: editingId || Date.now(),
                name: name,
                price: document.getElementById('pPrice').value,
                category: document.getElementById('pCatSelect').value,
                buyPreference: document.getElementById('pBuyPref').value,
                externalUrl: document.getElementById('pLink').value,
                description: document.getElementById('pDesc').value,
                images: validImgs
            };

            if(!window.shop_data.products) window.shop_data.products = [];
            if(editingId) {
                const idx = window.shop_data.products.findIndex(p => p.id === editingId);
                window.shop_data.products[idx] = prod;
            } else {
                window.shop_data.products.push(prod);
            }

            db.ref('shop_data').set(window.shop_data).then(() => { closeModal(); editingId = null; });
        }

        function editProduct(id) {
            editingId = id;
            const p = window.shop_data.products.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "Update Product";
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pCatSelect').value = p.category;
            document.getElementById('pBuyPref').value = p.buyPreference || 'whatsapp';
            document.getElementById('pLink').value = p.externalUrl || '';
            document.getElementById('pDesc').value = p.description;
            toggleBuyLink();
            
            productImages = [null, null, null];
            p.images.forEach((img, i) => {
                productImages[i] = img;
                const prev = document.getElementById(`prev${i}`);
                prev.src = img; prev.style.display = 'block';
            });
            document.getElementById('productModal').style.display = 'flex';
        }

        function deleteItem(type, id) {
            if(!confirm("Are you sure you want to delete this?")) return;
            window.shop_data[type] = window.shop_data[type].filter(i => i.id !== id);
            db.ref('shop_data').set(window.shop_data);
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value;
            if(!name) return;
            if(!window.shop_data.categories) window.shop_data.categories = [];
            window.shop_data.categories.push({ id: Date.now(), name });
            db.ref('shop_data').set(window.shop_data).then(() => document.getElementById('newCatName').value = "");
        }

        function saveSettings() {
            const user = document.getElementById('setUSer').value;
            const pass = document.getElementById('setPass').value;
            
            window.shop_data.settings.whatsappNumber = document.getElementById('prefWA').value;
            db.ref('shop_data').set(window.shop_data);

            if(user && pass) {
                db.ref('admin_creds').set({ user, pass }).then(() => alert("Security & Preferences Updated Successfully."));
            } else {
                alert("Preferences Updated.");
            }
        }
    </script>
</body>
</html>
