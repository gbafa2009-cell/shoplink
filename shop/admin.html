<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ShopLink Admin | Luxury Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #1a1614; --accent: #c8442a; --accent-soft: #fdf1ee;
            --bg: #f8f6f4; --white: #ffffff; --border: #eceae7;
            --text-main: #2d2926; --text-muted: #8c8581;
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: all 0.25s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        #loginWrap { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #3d2a22, #1a1614); position: fixed; width: 100%; z-index: 1000; }
        .loginBox { background: var(--white); padding: 50px 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        
        #app { display: none; height: 100vh; }
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border); padding: 40px 24px; display: flex; flex-direction: column; }
        .sidebar h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 50px; }
        .navBtn { display: flex; align-items: center; width: 100%; padding: 14px 18px; background: transparent; border: none; border-radius: 14px; margin-bottom: 10px; cursor: pointer; font-weight: 500; color: var(--text-muted); }
        .navBtn.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

        .main { flex: 1; overflow-y: auto; padding: 60px; }
        .panel { display: none; opacity: 0; transform: translateY(10px); }
        .panel.on { display: block; opacity: 1; transform: translateY(0); }
        
        .card { background: var(--white); padding: 35px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        .fGroup { margin-bottom: 20px; }
        .fGroup label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .fGroup input, .fGroup select, .fGroup textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #fafafa; font-family: inherit; font-size: 14px; }
        .fGroup textarea { height: 80px; resize: none; }

        .img-slot { width: 100%; height: 180px; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .btnP { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginWrap">
        <div class="loginBox">
            <h1 style="font-family:'Playfair Display'">ShopLink <span>Admin</span></h1>
            <div class="fGroup" style="margin-top:20px;"><input type="password" id="lp" placeholder="Security Password"></div>
            <button class="btnP" onclick="login()">Enter Dashboard</button>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <h2>ShopLink</h2>
            <button class="navBtn active" id="nb-dashboard" onclick="go('dashboard')">Overview</button>
            <button class="navBtn" id="nb-products" onclick="go('products')">Inventory</button>
            <button class="navBtn" id="nb-settings" onclick="go('settings')">Preferences</button>
            <div style="margin-top:auto;"><button class="navBtn" onclick="location.reload()" style="color:var(--accent)">Log out</button></div>
        </div>

        <div class="main">
            <div id="p-dashboard" class="panel on">
                <h1 style="font-family:'Playfair Display'; font-size:36px; margin-bottom:40px;">Portfolio Overview</h1>
                <div class="card" id="statsRow">Loading metrics...</div>
            </div>

            <div id="p-products" class="panel">
                <h1 style="font-family:'Playfair Display'; font-size:36px; margin-bottom:40px;">New Addition</h1>
                <div class="card">
                    <div class="fGroup">
                        <label>Display Imagery</label>
                        <div class="img-slot" onclick="document.getElementById('fileIn').click()">
                            <span id="imgPlaceholder" style="font-size:14px; color:var(--text-muted);">+ Upload Product Media</span>
                            <img id="imgPreview" style="display:none;">
                        </div>
                        <input type="file" id="fileIn" style="display:none;" accept="image/*" onchange="handleFile(this)">
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div class="fGroup"><label>Product Name</label><input type="text" id="pName" placeholder="Classic Timepiece"></div>
                        <div class="fGroup"><label>Value (GH₵)</label><input type="text" id="pPrice" placeholder="0.00"></div>
                    </div>
                    
                    <div class="fGroup">
                        <label>Short Description (Main Page)</label>
                        <textarea id="pDesc" placeholder="Brief overview of the product..."></textarea>
                    </div>

                    <div class="fGroup">
                        <label>More Info (Detail Box)</label>
                        <textarea id="pMoreInfo" placeholder="Add technical specs, shipping info, or material details..."></textarea>
                    </div>

                    <div class="fGroup">
                        <label>Direct Customers To</label>
                        <select id="pBuyMode" onchange="toggleUrl()">
                            <option value="whatsapp">Personal WhatsApp Chat</option>
                            <option value="url">External Boutique Link</option>
                        </select>
                    </div>
                    <div class="fGroup" id="urlField" style="display:none;"><label>External Destination</label><input type="text" id="pUrl" placeholder="https://..."></div>
                    <button class="btnP" onclick="saveProduct()">Curate Product</button>
                </div>
            </div>

            <div id="p-settings" class="panel">
                <h1 style="font-family:'Playfair Display'; font-size:36px; margin-bottom:40px;">Preferences</h1>
                <div class="card">
                    <div class="fGroup"><label>Business WhatsApp Number</label><input type="text" id="waNum" value="233596160395"></div>
                    <button class="btnP" onclick="saveSettings()">Update Profile</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-TbvFPRKuBNT5SnWKvDjTnBYG7Dp6lDU",
            authDomain: "affiliate-9d0f7.firebaseapp.com",
            databaseURL: "https://affiliate-9d0f7-default-rtdb.firebaseio.com",
            projectId: "affiliate-9d0f7",
            storageBucket: "affiliate-9d0f7.firebasestorage.app",
            messagingSenderId: "989805341800",
            appId: "1:989805341800:web:bfd1a1becd6ef48d9e1fdd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentImg = "";

        function login() {
            if(document.getElementById('lp').value === 'admin123') {
                document.getElementById('loginWrap').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                initData();
            } else { alert("Access Denied."); }
        }

        function go(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
            document.querySelectorAll('.navBtn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-'+name).classList.add('on');
            document.getElementById('nb-'+name).classList.add('active');
        }

        function toggleUrl() {
            document.getElementById('urlField').style.display = document.getElementById('pBuyMode').value === 'url' ? 'block' : 'none';
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImg = e.target.result;
                    document.getElementById('imgPreview').src = currentImg;
                    document.getElementById('imgPreview').style.display = 'block';
                    document.getElementById('imgPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initData() {
            db.ref('shop_data').on('value', (snap) => {
                window.shop_data = snap.val() || { products: [], settings: { whatsappNumber: '233596160395' } };
                document.getElementById('statsRow').innerHTML = `<h3>Inventory: ${window.shop_data.products ? window.shop_data.products.length : 0} Products</h3>`;
            });
        }

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const moreInfo = document.getElementById('pMoreInfo').value; // Get More Info
            
            if(!name || !currentImg) return alert("Product name and image are required.");

            const prod = { 
                id: Date.now(), 
                name, 
                price, 
                description: desc, 
                moreInfo: moreInfo, // Save More Info
                image: currentImg, 
                buyMode: document.getElementById('pBuyMode').value, 
                externalUrl: document.getElementById('pUrl').value, 
                available: true 
            };
            
            if(!window.shop_data.products) window.shop_data.products = [];
            window.shop_data.products.push(prod);
            db.ref('shop_data').set(window.shop_data).then(() => { alert("Product Saved Successfully."); location.reload(); });
        }

        function saveSettings() {
            const num = document.getElementById('waNum').value;
            if(!window.shop_data.settings) window.shop_data.settings = {};
            window.shop_data.settings.whatsappNumber = num;
            db.ref('shop_data').set(window.shop_data).then(() => alert("Profile Settings Updated."));
        }
    </script>
</body>
</html>
