<script>

// 2. INITIALIZE FIREBASE (Version 8)
// This uses the scripts loaded at the top of your file [cite: 699, 700]
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 3. GLOBAL DATA LISTENER
function getData() { 
  db.ref('shop_data').on('value', (snapshot) => { 
    const data = snapshot.val(); 
    if (data) { 
      window.shoplink_data = data; 
      // Refresh UI automatically if dashboard is open
      if(document.getElementById('app').classList.contains('app-visible')) {
          renderDash(); 
          if(typeof renderCats === "function") renderCats(); 
          if(typeof renderProducts === "function") renderProducts(); 
      }
    } else {
      window.shoplink_data = {categories:[], products:[]};
    }
  });
}

// 4. AUTHENTICATION & UTILITIES
function setData(d) { db.ref('shop_data').set(d); }

function getCreds(){
  try{return JSON.parse(localStorage.getItem('shoplink_creds'))||{user:'admin',pass:'admin123'};}
  catch(e){return{user:'admin',pass:'admin123'};}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function login(){ 
  var u=document.getElementById('lu').value.trim(); 
  var p=document.getElementById('lp').value; 
  var c=getCreds(); 
  if(u===c.user && p===c.pass){ 
    document.getElementById('loginWrap').style.display='none'; 
    document.getElementById('app').classList.add('app-visible'); 
    document.getElementById('whoami').textContent=u; 
    go('dashboard'); 
  } else { 
    document.getElementById('lerr').style.display='block';
  } 
}

function logout(){ 
  document.getElementById('app').classList.remove('app-visible'); 
  document.getElementById('loginWrap').style.display='flex'; 
  document.getElementById('lp').value=''; 
  document.getElementById('lerr').style.display='none'; 
}

// 5. NAVIGATION
var PANELS=['dashboard','categories','products','featured','sold','settings'];
var TITLES={dashboard:'Dashboard',categories:'Categories',products:'Products',featured:'Hot Deals / Featured',sold:'Sold / Removed',settings:'Settings'};

function go(name){ 
  PANELS.forEach(function(n){ 
    var p=document.getElementById('p-'+n); 
    var b=document.getElementById('nb-'+n); 
    if(p){p.className=n===name?'panel on':'panel';} 
    if(b){b.className=n===name?'navBtn on':'navBtn';} 
  });
  var t=document.getElementById('pageTitle'); 
  if(t)t.textContent=TITLES[name]||name; 
  if(name==='dashboard') renderDash();
  // Call other specific render functions here as needed
}

// 6. DASHBOARD RENDERING (FIXED)
function renderDash(){ 
  // Use the global data directly instead of calling getData() 
  var d = window.shoplink_data || {products:[], categories:[]}; 
  var prods=d.products||[];
  var cats=d.categories||[]; 
  var active=prods.filter(function(p){return p.available;}); 
  var feat=prods.filter(function(p){return p.featured&&p.available;}); 
  var sold=prods.filter(function(p){return !p.available;}); 
  
  var sr=document.getElementById('statsRow');
  if(sr)sr.innerHTML= 
    mkStat(' 📦 ','Total Products',prods.length)+ 
    mkStat(' ✅ ','Active',active.length)+ 
    mkStat(' 🗂 ','Categories',cats.length)+ 
    mkStat(' 🔥 ','Hot Deals',feat.length)+ 
    mkStat(' 🛒 ','Sold',sold.length);

  var recent=active.slice(-5).reverse(); 
  var dbBody=document.getElementById('dashBody'); 
  if(dbBody)dbBody.innerHTML=recent.length?recent.map(function(p){ 
    var cat=cats.find(function(c){return c.id===p.categoryId;}); 
    return '<tr><td><strong>'+esc(p.name)+'</strong></td><td><span class="pill pill-cat">'+(cat?(esc(cat.icon||'')+' '+esc(cat.name)):'—')+'</span></td><td>'+esc(p.price||'—')+'</td><td>'+(p.buyMode==='whatsapp'?'<span class="pill pill-wa"> 💬 WhatsApp</span>':'<span class="pill pill-site"> 🔗 Website</span>')+'</td></tr>'; 
  }).join(''):'<tr class="empty"><td colspan="4">No products yet</td></tr>';
}

function mkStat(ico,lbl,val){return '<div class="statBox"><div class="ico">'+ico+'</div><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>';}

// 7. INITIALIZE LISTENER ON LOAD
getData();
</script>
