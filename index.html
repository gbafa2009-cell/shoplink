<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopLink | Verified Art & Luxury</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --cream: #faf8f5; --white: #ffffff; --ink: #1a1614; --muted: #6b6560;
      --border: #e8e3dc; --accent: #c8442a; --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    /* 4. Loading Bar Styles */
    #loader {
        position: fixed; inset: 0; background: var(--white); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .load-bar-wrap { width: 200px; height: 4px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 20px; }
    .load-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s ease; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }

    header { background: var(--white); padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; }
    
    .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.8rem; text-decoration: none; color: var(--ink); text-transform: uppercase; letter-spacing: 1px; }
    .logo span { color: var(--accent); }
    
    .search-area { max-width: 1200px; margin: 10px auto; display: flex; align-items: center; gap: 15px; padding: 0 20px; }
    .search-box input { 
        padding: 10px 18px; border-radius: 25px; border: 1px solid var(--border); 
        outline: none; font-size: 14px; width: 100%; flex: 1; transition: 0.3s;
        background: #f9f9f9;
    }

    /* 3. View Toggle Button */
    .view-btn { 
        padding: 10px 15px; border: 1px solid var(--border); background: var(--white); 
        border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase;
    }

    .cat-bar { background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; padding: 15px 0; scrollbar-width: none; }
    .cat-inner { max-width: 1200px; margin: auto; padding: 0 20px; display: flex; gap: 20px; }
    .cat-link { text-decoration: none; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
    .cat-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

    main { max-width: 1200px; margin: auto; padding: 20px; min-height: 60vh; }
    
    /* Layout Logic */
    .grid { display: grid; gap: 15px; }
    .view-grid { grid-template-columns: repeat(2, 1fr); }
    .view-list { grid-template-columns: 1fr; max-width: 600px; margin: auto; }
    
    .card { background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; display: flex; }
    .view-grid .card { flex-direction: column; }
    .view-list .card { flex-direction: row; height: 160px; }
    
    .card img { object-fit: cover; border-bottom: 1px solid var(--border); }
    .view-grid .card img { width: 100%; aspect-ratio: 1 / 1.4; }
    .view-list .card img { width: 120px; height: 100%; border-bottom: none; border-right: 1px solid var(--border); }
    
    .card-info { padding: 12px; text-align: left; flex: 1; }
    
    /* 2. Small Company Name at top */
    .card-vendor { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 2px; }
    
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 4px; color: var(--ink); font-weight: 700; }

    /* 1. Organized Description */
    .card-desc {
        font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
        display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
        line-height: 1.4; white-space: pre-wrap;
    }

    .card-price { color: var(--accent); font-weight: 700; font-size: 1rem; }

    .modal { position: fixed; inset: 0; background: var(--white); z-index: 1000; display: none; overflow-y: auto; }
    .modal.open { display: block; animation: slideUp 0.4s ease; }
    
    .carousel { position: relative; width: 100%; max-width: 550px; margin: 0 auto 20px; aspect-ratio: 1/1.2; box-shadow: var(--shadow); border-radius: 15px; overflow: hidden; }
    .carousel img { width: 100%; height: 100%; object-fit: cover; }
    
    .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .prev { left: 10px; } .next { right: 10px; }

    .close-btn { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; border: none; background: none; z-index: 1001; }
    .buy-btn { width: 100%; padding: 18px; background: var(--ink); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px; }

    /* 5. Footer Inquiry */
    footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<div id="loader">
    <h2 style="font-family:'Playfair Display';">ShopLink</h2>
    <div class="load-bar-wrap"><div class="load-bar" id="lBar"></div></div>
</div>

<header>
  <div class="nav-top">
    <a href="#" class="logo">Shop<span>Link</span></a>
  </div>
</header>

<div class="search-area">
    <input type="text" id="searchIn" placeholder="Search product name..." oninput="handleSearch()">
    <button class="view-btn" id="toggleView" onclick="toggleLayout()">List View</button>
</div>

<div class="cat-bar">
  <div class="cat-inner" id="catNav"><span class="cat-link active" onclick="filterCat('all', this)">All Collections</span></div>
</div>

<main><div class="grid view-grid" id="productGrid"></div></main>

<footer>
    For more inquiry, contact: 0596584654 on WhatsApp
</footer>

<div class="modal" id="detailModal">
  <button class="close-btn" onclick="closeModal()">✕</button>
  <div style="max-width: 600px; margin: 60px auto; padding: 20px;">
    <div class="carousel">
      <img id="mImg" src="">
      <button class="arrow prev" onclick="changeImg(-1)">❮</button>
      <button class="arrow next" onclick="changeImg(1)">❯</button>
    </div>
    <div style="text-align: center;">
        <div id="mVendor" style="font-size:12px; text-transform:uppercase; color:var(--muted); margin-bottom:5px;"></div>
        <h1 id="mTitle" style="font-family:'Playfair Display'; margin-bottom:10px;"></h1>
        <h3 id="mPrice" style="color:var(--accent); margin-bottom:20px;"></h3>
        <p id="mDesc" style="color:var(--muted); margin-bottom:25px; line-height:1.6; white-space:pre-wrap;"></p>
        <button class="buy-btn" onclick="executeBuy()">SECURE PURCHASE INQUIRY</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
      apiKey: "AIzaSyB-TbvFPRKuBNT5SnWKvDjTnBYG7Dp6lDU",
      authDomain: "affiliate-9d0f7.firebaseapp.com",
      databaseURL: "https://affiliate-9d0f7-default-rtdb.firebaseio.com",
      projectId: "affiliate-9d0f7",
      storageBucket: "affiliate-9d0f7.firebasestorage.app",
      messagingSenderId: "989805341800",
      appId: "1:989805341800:web:bfd1a1becd6ef48d9e1fdd"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let allProds = [], currentProduct = null, imgIdx = 0, isGrid = true;

  // 4. Fake loading progress
  let progress = 0;
  let interval = setInterval(() => {
    progress += 20;
    document.getElementById('lBar').style.width = progress + '%';
    if(progress >= 100) {
        clearInterval(interval);
        setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
    }
  }, 150);

  db.ref('shop_data').on('value', (snap) => {
    const data = snap.val() || {};
    allProds = data.products || [];
    window.settings = data.settings || {};
    
    const catNav = document.getElementById('catNav');
    catNav.innerHTML = '<span class="cat-link active" onclick="filterCat(\'all\', this)">All Collections</span>';
    (data.categories || []).forEach(c => {
      catNav.innerHTML += `<span class="cat-link" onclick="filterCat('${c.name}', this)">${c.name}</span>`;
    });
    renderGrid(allProds);
  });

  function renderGrid(list) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = list.map(p => {
        const displayImg = (p.images && p.images.length > 0) ? p.images[0] : (p.image || '');
        return `
          <div class="card" onclick="openModal(${p.id})">
            <img src="${displayImg}">
            <div class="card-info">
              <div class="card-vendor">${p.companyName || 'Verified Seller'}</div>
              <div class="card-title">${p.name}</div>
              <div class="card-desc">${p.description || ''}</div>
              <div class="card-price">GH₵ ${p.price}</div>
            </div>
          </div>`;
    }).join('');
  }

  function toggleLayout() {
    const grid = document.getElementById('productGrid');
    const btn = document.getElementById('toggleView');
    isGrid = !isGrid;
    if(isGrid) {
        grid.className = "grid view-grid";
        btn.innerText = "List View";
    } else {
        grid.className = "grid view-list";
        btn.innerText = "Grid View";
    }
  }

  function openModal(id) {
    currentProduct = allProds.find(p => p.id === id);
    imgIdx = 0;
    document.getElementById('mTitle').textContent = currentProduct.name;
    document.getElementById('mVendor').textContent = currentProduct.companyName || 'Verified Seller';
    document.getElementById('mPrice').textContent = `GH₵ ${currentProduct.price}`;
    document.getElementById('mDesc').textContent = currentProduct.description;
    updateCarousel();
    document.getElementById('detailModal').classList.add('open');
  }

  function updateCarousel() {
    const imgs = (currentProduct.images && currentProduct.images.length > 0) ? currentProduct.images : [currentProduct.image];
    document.getElementById('mImg').src = imgs[imgIdx] || '';
    document.querySelectorAll('.arrow').forEach(a => a.style.display = imgs.length > 1 ? 'block' : 'none');
  }

  function changeImg(dir) {
    const imgs = (currentProduct.images && currentProduct.images.length > 0) ? currentProduct.images : [currentProduct.image];
    imgIdx = (imgIdx + dir + imgs.length) % imgs.length;
    updateCarousel();
  }

  function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

  function executeBuy() {
    const msg = encodeURIComponent(`Inquiry: ${currentProduct.name} (GH₵ ${currentProduct.price})`);
    const wa = window.settings.whatsappNumber || '233596160395';
    window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
  }

  function handleSearch() {
    const term = document.getElementById('searchIn').value.toLowerCase();
    renderGrid(allProds.filter(p => p.name.toLowerCase().includes(term)));
  }

  function filterCat(cat, el) {
    document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    renderGrid(cat === 'all' ? allProds : allProds.filter(p => p.category === cat));
  }
</script>
</body>
</html>
